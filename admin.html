<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFiHuset — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDEDE7; --surface:#FBFBF8; --surface-2:#F4F4EF;
  --ink:#15171C; --slate:#565C66; --slate-2:#7A828C;
  --line:#D9D8D0; --line-soft:#E6E5DE;
  --signal:#1B4BFF; --signal-deep:#0E2FB8; --signal-soft:rgba(27,75,255,.08);
  --gold:#A9791A;
  --fd:'Bricolage Grotesque',sans-serif; --fb:'IBM Plex Sans',sans-serif; --fm:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--fb);font-size:15px;line-height:1.5;}
h1,h2,h3{font-family:var(--fd);margin:0;letter-spacing:-.02em;}
a{color:var(--signal);}

/* toolbar */
.bar{position:sticky;top:0;z-index:50;background:rgba(237,237,231,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--fd);font-weight:800;font-size:1.15rem;}
.brand .mk{width:28px;height:28px;border-radius:7px;background:var(--ink);display:grid;place-items:center;}
.brand .mk svg{width:17px;height:17px;}
.bar .sp{flex:1;}
.status{font-family:var(--fm);font-size:.78rem;color:var(--slate-2);min-width:120px;text-align:right;}
.status.ok{color:#0E7A53;}
.btn{font-family:var(--fb);font-weight:600;font-size:.85rem;padding:9px 15px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;transition:.18s;white-space:nowrap;}
.btn:hover{border-color:var(--ink);}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
.btn.primary:hover{background:var(--signal);}
.btn.warn{color:#B42318;border-color:rgba(180,35,24,.3);}
.btn.warn:hover{background:#FFF3F2;border-color:#B42318;}
.btn.acc{background:var(--signal);color:#fff;border-color:var(--signal);}
.btn.acc:hover{background:var(--signal-deep);}
.btn.go{background:#0E7A53;color:#fff;border-color:#0E7A53;}
.btn.go:hover{background:#0A5F40;}

.layout{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 58px);}
.pubnote{background:#FFF8E6;border-bottom:1px solid #E9D9A8;color:#6B5410;padding:11px 20px;font-size:.85rem;line-height:1.45;}
.pubnote b{color:#4A3A0B;}
.side{border-right:1px solid var(--line);padding:18px 12px;position:sticky;top:58px;align-self:start;height:calc(100vh - 58px);overflow:auto;}
.tab{display:block;width:100%;text-align:left;padding:10px 14px;border:0;background:none;border-radius:8px;cursor:pointer;font-family:var(--fb);font-size:.92rem;color:var(--slate);font-weight:500;margin-bottom:2px;}
.tab:hover{background:var(--surface-2);color:var(--ink);}
.tab.active{background:var(--ink);color:#fff;}
.panel{padding:30px 36px 80px;max-width:920px;}
.panel h2{font-size:1.6rem;margin-bottom:6px;}
.lead{color:var(--slate);margin-bottom:26px;font-size:.95rem;}
.hint{background:var(--signal-soft);border:1px solid rgba(27,75,255,.18);border-radius:10px;padding:13px 16px;font-size:.85rem;color:var(--slate);margin-bottom:24px;}
.hint b{color:var(--ink);}

.f{display:block;margin-bottom:15px;}
.fl{display:block;font-family:var(--fm);font-size:.7rem;letter-spacing:.05em;text-transform:uppercase;color:var(--slate-2);margin-bottom:6px;}
.in{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);font-family:var(--fb);font-size:.92rem;transition:.18s;}
textarea.in{resize:vertical;line-height:1.55;}
.in:focus{outline:none;border-color:var(--signal);box-shadow:0 0 0 3px var(--signal-soft);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

.card{border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px;background:var(--surface);position:relative;}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;}
.card-h .t{font-family:var(--fd);font-weight:700;font-size:1rem;}
.ctrls{display:flex;gap:6px;}
.mini{border:1px solid var(--line);background:var(--surface-2);border-radius:7px;width:30px;height:30px;display:grid;place-items:center;cursor:pointer;font-size:.95rem;color:var(--slate);}
.mini:hover{border-color:var(--ink);color:var(--ink);}
.mini.del:hover{color:#B42318;border-color:#B42318;}
.add{width:100%;border:1.5px dashed var(--line);background:none;border-radius:10px;padding:12px;cursor:pointer;font-family:var(--fm);font-size:.82rem;color:var(--slate-2);transition:.18s;}
.add:hover{border-color:var(--signal);color:var(--signal);}

.color-f{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--surface);}
.color-f input[type=color]{width:34px;height:34px;border:0;border-radius:6px;background:none;cursor:pointer;padding:0;}
.color-f input[type=text]{border:0;outline:none;font-family:var(--fm);font-size:.85rem;width:90px;background:none;color:var(--ink);}
.swatches{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}

.imgwrap{display:flex;gap:16px;align-items:center;}
.preview{width:130px;height:96px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);display:grid;place-items:center;overflow:hidden;flex:none;}
.preview img{max-width:100%;max-height:100%;object-fit:contain;}
.preview svg{width:90%;height:90%;}
.stringlist .si{display:flex;gap:8px;margin-bottom:8px;}
.stringlist .si .in{flex:1;}
.note{font-size:.78rem;color:var(--slate-2);margin-top:5px;}
.check{display:flex;align-items:center;gap:9px;font-size:.9rem;cursor:pointer;user-select:none;margin-bottom:14px;}
.check input{width:18px;height:18px;accent-color:var(--signal);}
@media(max-width:760px){ .layout{grid-template-columns:1fr;} .side{position:static;height:auto;display:flex;flex-wrap:wrap;gap:4px;} .tab{width:auto;} .panel{padding:22px;} .row,.row3,.row4{grid-template-columns:1fr;} }
</style>
</head>
<body>

<div class="bar">
  <div class="brand"><span class="mk"><svg viewBox="0 0 64 64" fill="none"><g stroke="#1B4BFF" stroke-width="4" stroke-linecap="round"><path d="M18 36a20 20 0 0 1 28 0"/><path d="M24 42a12 12 0 0 1 16 0"/></g><circle cx="32" cy="48" r="3.6" fill="#1B4BFF"/></svg></span>Admin</div>
  <div class="sp"></div>
  <span class="status" id="status">Klar</span>
  <button class="btn" id="preview">Forhåndsvis ↗</button>
  <button class="btn" id="export">Eksportér JSON</button>
  <button class="btn" id="importBtn">Importér JSON</button>
  <button class="btn" id="exportJs">Download config.js</button>
  <button class="btn warn" id="reset">Nulstil</button>
  <button class="btn primary" id="save">Gem lokalt</button>
  <button class="btn go" id="publish">Udgiv live ⤴</button>
  <input type="file" id="importFile" accept="application/json" hidden>
</div>

<div class="pubnote">
  <b>Sådan får du ændringer live:</b> Tryk <b>Udgiv live ⤴</b> — så sendes ændringerne direkte til din hjemmeside og vises på alle enheder (også telefonen) inden for ca. et minut. <b>Gem lokalt</b> gemmer kun i denne browser. Første gang skal du forbinde GitHub under fanen <b>Udgiv (GitHub)</b>.
</div>

<div class="layout">
  <nav class="side" id="tabs"></nav>
  <main class="panel" id="panel"></main>
</div>

<script src="config.js"></script>
<script>
const LS_KEY='wifihuset_config_v1';
function clone(o){return JSON.parse(JSON.stringify(o));}
function deepMerge(base,src){
  if(Array.isArray(src))return src.slice();
  if(typeof src!=='object'||src===null)return src;
  const out=Array.isArray(base)?[]:Object.assign({},base);
  for(const k in src){
    if(typeof src[k]==='object'&&src[k]!==null&&!Array.isArray(src[k])&&typeof base?.[k]==='object')out[k]=deepMerge(base[k],src[k]);
    else out[k]=src[k];
  } return out;
}
let CONFIG = clone(window.DEFAULT_CONFIG);
try{ const s=localStorage.getItem(LS_KEY); if(s)CONFIG=deepMerge(CONFIG,JSON.parse(s)); }catch(e){}

/* ---- theme applied to admin too ---- */
function hexA(hex,a){try{const n=parseInt(hex.replace('#',''),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}catch(e){return hex;}}
function applyTheme(){const t=CONFIG.theme,r=document.documentElement.style;
  r.setProperty('--signal',t.signal);r.setProperty('--signal-deep',t.signalDeep);r.setProperty('--gold',t.gold);
  r.setProperty('--signal-soft',hexA(t.signal,.08));}
applyTheme();

/* ---- save ---- */
let saveT, statusEl=document.getElementById('status');
function setStatus(msg,ok){statusEl.textContent=msg;statusEl.className='status'+(ok?' ok':'');}
function saveNow(){ try{localStorage.setItem(LS_KEY,JSON.stringify(CONFIG));setStatus('Gemt ✓',true);}catch(e){setStatus('Fejl: for stor (billeder?)',false);} }
function queueSave(){ setStatus('Gemmer…'); clearTimeout(saveT); saveT=setTimeout(()=>{saveNow();applyTheme();},350); }

/* ---- DOM helpers ---- */
function el(tag,attrs={},...kids){const n=document.createElement(tag);
  for(const k in attrs){const v=attrs[k];
    if(k==='class')n.className=v;else if(k==='html')n.innerHTML=v;
    else if(k.startsWith('on')&&typeof v==='function')n.addEventListener(k.slice(2),v);
    else if(v!=null)n.setAttribute(k,v);}
  kids.flat().forEach(c=>{if(c==null||c===false)return;n.appendChild(typeof c==='string'?document.createTextNode(c):c);});return n;}

function fText(label,obj,key,opts={}){
  const i=opts.area?el('textarea',{class:'in',rows:opts.rows||3}):el('input',{class:'in',type:opts.type||'text'});
  i.value=obj[key]??''; if(opts.ph)i.placeholder=opts.ph;
  i.addEventListener('input',()=>{obj[key]=i.value;queueSave();});
  return el('label',{class:'f'},el('span',{class:'fl'},label),i);
}
function fNum(label,obj,key,opts={}){
  const i=el('input',{class:'in',type:'number',step:opts.step||'0.1'});
  if(opts.min!=null)i.min=opts.min; if(opts.max!=null)i.max=opts.max;
  i.value=obj[key]??''; i.addEventListener('input',()=>{obj[key]=parseFloat(i.value)||0;queueSave();});
  return el('label',{class:'f'},el('span',{class:'fl'},label),i);
}
function fCheck(label,obj,key){
  const i=el('input',{type:'checkbox'}); i.checked=!!obj[key];
  i.addEventListener('change',()=>{obj[key]=i.checked;queueSave();});
  return el('label',{class:'check'},i,el('span',{},label));
}
function fSelect(label,obj,key,options){
  const s=el('select',{class:'in'});
  options.forEach(o=>{const op=el('option',{},o);if(o===obj[key])op.selected=true;s.appendChild(op);});
  s.addEventListener('change',()=>{obj[key]=s.value;queueSave();});
  return el('label',{class:'f'},el('span',{class:'fl'},label),s);
}
function fColor(label,theme,key){
  const c=el('input',{type:'color'}); c.value=theme[key];
  const t=el('input',{type:'text'}); t.value=theme[key];
  function sync(v){theme[key]=v;c.value=v;t.value=v;queueSave();}
  c.addEventListener('input',()=>sync(c.value));
  t.addEventListener('input',()=>{if(/^#[0-9a-fA-F]{6}$/.test(t.value))sync(t.value);});
  return el('div',{class:'f'},el('span',{class:'fl'},label),el('div',{class:'color-f'},c,t));
}

/* string-array editor */
function stringList(arr,label,ph){
  const box=el('div',{class:'stringlist'});
  function draw(){box.innerHTML='';arr.forEach((v,i)=>{
    const inp=el('input',{class:'in',value:v,placeholder:ph||''});
    inp.addEventListener('input',()=>{arr[i]=inp.value;queueSave();});
    const del=el('button',{class:'mini del',title:'Slet',onclick:()=>{arr.splice(i,1);draw();queueSave();}},'✕');
    box.appendChild(el('div',{class:'si'},inp,del));
  });
  box.appendChild(el('button',{class:'add',onclick:()=>{arr.push('');draw();queueSave();}},'+ '+(label||'Tilføj')));}
  draw();return box;
}

/* generic object-array editor */
function listEditor(arr,renderItem,makeNew,opts={}){
  const wrap=el('div',{});
  function draw(){wrap.innerHTML='';
    arr.forEach((item,i)=>{
      const ctrls=el('div',{class:'ctrls'});
      if(opts.reorder!==false){
        ctrls.appendChild(el('button',{class:'mini',title:'Op',onclick:()=>{if(i>0){[arr[i-1],arr[i]]=[arr[i],arr[i-1]];draw();queueSave();}}},'↑'));
        ctrls.appendChild(el('button',{class:'mini',title:'Ned',onclick:()=>{if(i<arr.length-1){[arr[i+1],arr[i]]=[arr[i],arr[i+1]];draw();queueSave();}}},'↓'));
      }
      ctrls.appendChild(el('button',{class:'mini del',title:'Slet',onclick:()=>{if(confirm('Slet dette element?')){arr.splice(i,1);draw();queueSave();}}},'✕'));
      const head=el('div',{class:'card-h'},el('div',{class:'t'},(opts.title?opts.title(item,i):'#'+(i+1))),ctrls);
      wrap.appendChild(el('div',{class:'card'},head,...renderItem(item,i,draw)));
    });
    wrap.appendChild(el('button',{class:'add',onclick:()=>{arr.push(makeNew());draw();queueSave();}},'+ '+(opts.addLabel||'Tilføj')));
  }
  draw();return wrap;
}

/* winner image field */
function imageField(w,redraw){
  const prev=el('div',{class:'preview'});
  function paint(){ prev.innerHTML = w.img ? `<img src="${w.img}" onerror="this.parentElement.innerHTML=(window.ART['${w.artKey}']||window.ART.generic)">` : (window.ART[w.artKey]||window.ART.generic); }
  paint();
  const url=el('input',{class:'in',type:'text',placeholder:'fx images/anthbot.jpg eller https://…'});
  url.value=(w.img && !w.img.startsWith('data:'))?w.img:'';
  url.addEventListener('input',()=>{w.img=url.value.trim();paint();queueSave();});
  const file=el('input',{type:'file',accept:'image/*'});
  file.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;
    if(f.size>900000){alert('Billedet er '+Math.round(f.size/1024)+' KB. Tip: brug hellere en billed-URL (læg filen i en /images-mappe i dit repo) — så holder config.js sig lille og virker hurtigt på alle enheder.');}
    const r=new FileReader();r.onload=ev=>{w.img=ev.target.result;url.value='';paint();queueSave();};r.readAsDataURL(f);});
  const clear=el('button',{class:'btn',onclick:()=>{w.img='';url.value='';paint();queueSave();}},'Ryd → brug illustration');
  const right=el('div',{style:'flex:1'},
    el('div',{class:'fl',style:'margin-bottom:6px'},'Produktbillede (valgfrit)'),
    url,
    el('div',{class:'note',style:'margin:6px 0 10px'},'Anbefalet: læg billedet i repoet (fx /images/navn.jpg) og skriv stien her — virker på alle enheder. Upload-knappen indlejrer billedet direkte, men vises kun i denne browser, indtil du downloader config.js og lægger den i repoet.'),
    file,
    el('div',{style:'margin-top:8px'},clear));
  return el('div',{class:'f imgwrap'},prev,right);
}

/* ================= TABS ================= */
const TABS=[
  {id:'brand',label:'Brand & tema',render:tBrand},
  {id:'hero',label:'Hero',render:tHero},
  {id:'method',label:'Metode',render:tMethod},
  {id:'winners',label:'Testvindere',render:tWinners},
  {id:'catalog',label:'Katalog',render:tCatalog},
  {id:'standards',label:'Standarder',render:tStandards},
  {id:'compare',label:'Sammenligning',render:tCompare},
  {id:'helper',label:'Hjælper',render:tHelper},
  {id:'offer',label:'Tilbudsformular',render:tOffer},
  {id:'faq',label:'FAQ',render:tFaq},
  {id:'footer',label:'Footer',render:tFooter},
  {id:'publish',label:'⤴ Udgiv (GitHub)',render:tPublish},
];
let active='brand';
const tabsEl=document.getElementById('tabs'),panel=document.getElementById('panel');
function drawTabs(){tabsEl.innerHTML='';TABS.forEach(t=>{
  tabsEl.appendChild(el('button',{class:'tab'+(t.id===active?' active':''),onclick:()=>{active=t.id;drawTabs();drawPanel();}},t.label));});}
function drawPanel(){panel.innerHTML='';const t=TABS.find(x=>x.id===active);t.render(panel);panel.scrollTo?panel.scrollTo(0,0):0;window.scrollTo(0,0);}

function head(p,title,lead,hint){
  p.appendChild(el('h2',{},title));
  if(lead)p.appendChild(el('p',{class:'lead'},lead));
  if(hint)p.appendChild(el('div',{class:'hint',html:hint}));
}

/* ---- Brand & theme ---- */
function tBrand(p){
  head(p,'Brand & tema','Navn, tagline og farver for hele sitet.');
  p.appendChild(fText('Sidenavn',CONFIG.brand,'name'));
  p.appendChild(fText('Tagline (footer)',CONFIG.brand,'tagline',{area:true,rows:2}));
  p.appendChild(fText('Browser-titel (SEO)',CONFIG.brand,'metaTitle'));
  p.appendChild(el('h3',{style:'margin:24px 0 12px'},'Farvetema'));
  const t=CONFIG.theme;
  const sw=el('div',{class:'swatches'},
    fColor('Baggrund',t,'paper'),fColor('Kort-flade',t,'surface'),fColor('Flade 2',t,'surface2'),
    fColor('Tekst / mørk',t,'ink'),fColor('Accent (signal)',t,'signal'),fColor('Accent mørk',t,'signalDeep'),
    fColor('Guld (vinder)',t,'gold'));
  p.appendChild(sw);
}

/* ---- Hero ---- */
function tHero(p){
  head(p,'Hero','Det øverste banner.');
  const h=CONFIG.hero;
  p.appendChild(fText('Eyebrow (lille label)',h,'eyebrow'));
  p.appendChild(el('div',{class:'row3'},fText('Overskrift linje 1',h,'line1'),fText('Linje 2',h,'line2'),fText('Linje 3 (accent)',h,'line3')));
  p.appendChild(fText('Brødtekst',h,'lead',{area:true}));
  p.appendChild(el('div',{class:'row'},fText('Knap 1 (primær)',h,'btnPrimary'),fText('Knap 2 (sekundær)',h,'btnGhost')));
  p.appendChild(el('h3',{style:'margin:22px 0 12px'},'Tillids-tal (3 stk.)'));
  p.appendChild(listEditor(h.stats,(s)=>[el('div',{class:'row'},fText('Tal',s,'v'),fText('Tekst',s,'l'))],()=>({v:'Nyt',l:'Label'}),{addLabel:'Tilføj tal',title:s=>s.v}));
  p.appendChild(el('h3',{style:'margin:22px 0 12px'},'Hero-kort (mesh)'));
  p.appendChild(el('div',{class:'row3'},fText('Label',h,'cardLabel'),fText('Score',h,'cardScore'),fText('Score-tekst',h,'cardScoreLabel')));
}

/* ---- Method ---- */
function tMethod(p){
  head(p,'Metode','Sektionen “Sådan arbejder vi”.');
  const m=CONFIG.method;
  p.appendChild(fText('Eyebrow',m,'eyebrow'));p.appendChild(fText('Overskrift',m,'heading'));p.appendChild(fText('Undertekst',m,'sub',{area:true,rows:2}));
  p.appendChild(el('h3',{style:'margin:22px 0 12px'},'Punkter'));
  p.appendChild(listEditor(m.items,(it)=>[fText('Titel',it,'t'),fText('Tekst',it,'d',{area:true,rows:2})],()=>({t:'Nyt punkt',d:''}),{title:it=>it.t,addLabel:'Tilføj punkt'}));
}

/* ---- Winners ---- */
function tWinners(p){
  head(p,'Testvindere','De tre fremhævede kort. Marker én som “Bedste i test” for guld-fremhævning. Upload foto eller vælg en illustration.');
  const wh=CONFIG.winnersHead;
  p.appendChild(fText('Eyebrow',wh,'eyebrow'));p.appendChild(fText('Overskrift',wh,'heading'));p.appendChild(fText('Undertekst',wh,'sub',{area:true,rows:2}));
  p.appendChild(el('h3',{style:'margin:22px 0 12px'},'Vindere'));
  p.appendChild(listEditor(CONFIG.winners,(w,i,redraw)=>[
    el('div',{class:'row'},fText('Navn',w,'name'),fText('Kategori',w,'cat')),
    el('div',{class:'row'},fText('Award-tekst',w,'award'),fNum('Score (0-10)',w,'score',{max:10,min:0})),
    fCheck('Bedste i test (guld + flag)',w,'featured'),
    fText('Vurdering',w,'verdict',{area:true,rows:3}),
    el('div',{class:'row'},
      el('div',{},el('span',{class:'fl'},'Fordele (+)'),stringList(w.pros,'Tilføj fordel')),
      el('div',{},el('span',{class:'fl'},'Ulemper (–)'),stringList(w.cons,'Tilføj ulempe'))),
    el('div',{class:'row'},fText('Pris-tekst',w,'price'),fSelect('Illustration',w,'artKey',window.ART_KEYS)),
    imageField(w,redraw)
  ],()=>({id:'w'+Date.now(),name:'Nyt produkt',cat:'Kategori',award:'Testvinder',featured:false,score:9.0,artKey:'generic',img:'',imgFit:'contain',price:'≈ 0 kr.',verdict:'',pros:['Fordel'],cons:['Ulempe']}),
  {title:w=>w.name,addLabel:'Tilføj vinder'}));
}

/* ---- Catalog ---- */
function tCatalog(p){
  head(p,'Katalog','Alle anbefalede produkter. Kategorien styrer filter-knapperne automatisk.');
  const ch=CONFIG.catalogHead;
  p.appendChild(fText('Eyebrow',ch,'eyebrow'));p.appendChild(fText('Overskrift',ch,'heading'));p.appendChild(fText('Undertekst',ch,'sub',{area:true,rows:2}));
  p.appendChild(el('h3',{style:'margin:22px 0 12px'},'Produkter ('+CONFIG.catalog.length+')'));
  p.appendChild(listEditor(CONFIG.catalog,(pr)=>[
    el('div',{class:'row'},fText('Navn',pr,'name'),fText('Kategori',pr,'cat')),
    el('div',{class:'row'},fText('Protokol/tag',pr,'proto'),fNum('Score',pr,'score',{max:10,min:0})),

  if(!gh.owner||!gh.repo){ const d=detectRepo(); if(d.owner&&!gh.owner)gh.owner=d.owner; if(d.repo&&!gh.repo)gh.repo=d.repo; saveGH(gh); }

  p.appendChild(el('div',{class:'row'},bind('owner','GitHub-brugernavn (owner)','fx Kronborg1980'),bind('repo','Repository-navn','fx wifihuset')));
  p.appendChild(el('div',{class:'row'},bind('branch','Branch','main'),bind('path','Fil der opdateres','config.js')));
  p.appendChild(bind('token','Fine-grained token','github_pat_…','password'));
  const st=el('div',{class:'note',style:'margin:4px 0 14px'},'');
  const test=el('button',{class:'btn',onclick:async()=>{st.textContent='Tester…';st.style.color='';const ok=await testConn();st.textContent=ok.msg;st.style.color=ok.ok?'#0E7A53':'#B42318';}},'Test forbindelse');

/* ----- GitHub publish ----- */
const GH_KEY='wifihuset_gh';
function loadGH(){ try{return JSON.parse(localStorage.getItem(GH_KEY))||{};}catch(e){return{};} }
function saveGH(gh){ try{localStorage.setItem(GH_KEY,JSON.stringify(gh));}catch(e){} }
function detectRepo(){ try{const h=location.hostname,parts=location.pathname.split('/').filter(Boolean);
  if(h.endsWith('github.io')){const owner=h.split('.')[0];const repo=parts[0]||(owner+'.github.io');return{owner,repo};}}catch(e){} return {}; }
function ghHeaders(gh){ return {'Authorization':'Bearer '+gh.token,'Accept':'application/vnd.github+json'}; }
function b64utf8(str){ const bytes=new TextEncoder().encode(str); let bin=''; const c=0x8000;
  for(let i=0;i<bytes.length;i+=c){ bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+c)); } return btoa(bin); }
async function testConn(){
  const gh=loadGH(); if(!gh.owner||!gh.repo||!gh.token) return {ok:false,msg:'Udfyld owner, repo og token først.'};
  try{ const r=await fetch('https://api.github.com/repos/'+gh.owner+'/'+gh.repo,{headers:ghHeaders(gh)});
    if(r.ok) return {ok:true,msg:'Forbindelse OK ✓ — klar til at udgive.'};
    if(r.status===404) return {ok:false,msg:'Repo ikke fundet (tjek owner/repo) eller token mangler adgang.'};
    if(r.status===401) return {ok:false,msg:'Token afvist (401). Tjek at token er gyldigt og ikke udløbet.'};
    return {ok:false,msg:'Fejl '+r.status+'.'};
  }catch(e){ return {ok:false,msg:'Netværksfejl: '+e.message}; }
}
async function publish(){
  const gh=loadGH();
  if(!gh.owner||!gh.repo||!gh.token){ active='publish'; drawTabs(); drawPanel(); alert('Forbind GitHub først (fanen “Udgiv (GitHub)”).'); return; }
  const branch=gh.branch||'main', path=gh.path||'config.js';
  const api='https://api.github.com/repos/'+gh.owner+'/'+gh.repo+'/contents/'+path;
  setStatus('Udgiver…');
  try{
    let sha;
    const g=await fetch(api+'?ref='+encodeURIComponent(branch),{headers:ghHeaders(gh)});
    if(g.status===200){ sha=(await g.json()).sha; }
    else if(g.status!==404){ throw new Error('Læsning fejlede ('+g.status+').'); }
    const body={message:'Opdater '+path+' via WiFiHuset-admin',content:b64utf8(buildConfigJs()),branch};
    if(sha) body.sha=sha;
    const r=await fetch(api,{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},ghHeaders(gh)),body:JSON.stringify(body)});
    if(!r.ok){ let t=''; try{t=(await r.json()).message||'';}catch(e){} throw new Error('('+r.status+') '+t); }
    saveNow();
    setStatus('Udgivet ✓ — live om ~1 min',true);
    alert('Udgivet! Siden opdateres typisk inden for et minut.\nHard-refresh / pull-to-refresh på telefonen for at se det med det samme.');
  }catch(e){
    setStatus('Udgivelse fejlede',false);
    alert('Kunne ikke udgive:\n'+e.message+'\n\nTjek:\n• Token har Contents: Read and write på netop dette repo\n• owner / repo / branch er korrekte');
  }
}
document.getElementById('publish').addEventListener('click',publish);
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{try{const obj=JSON.parse(ev.target.result);CONFIG=deepMerge(clone(window.DEFAULT_CONFIG),obj);saveNow();applyTheme();drawPanel();setStatus('Importeret ✓',true);}catch(err){alert('Kunne ikke læse filen: '+err.message);}};r.readAsText(f);e.target.value='';});
document.getElementById('reset').addEventListener('click',()=>{
  if(confirm('Nulstil ALT til standardindholdet? Dette sletter dine ændringer i denne browser.')){
    localStorage.removeItem(LS_KEY);CONFIG=clone(window.DEFAULT_CONFIG);applyTheme();drawPanel();setStatus('Nulstillet',true);}});
function download(name,text,mime){const b=new Blob([text],{type:mime});const u=URL.createObjectURL(b);
  const a=el('a',{href:u,download:name});document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);}

/* init */
drawTabs();drawPanel();setStatus('Klar');
