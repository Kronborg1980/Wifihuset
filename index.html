<style>
:root{--paper:#EDEDE7;--surface:#FBFBF8;--surface-2:#F4F4EF;--ink:#15171C;--slate:#565C66;--slate-2:#7A828C;--line:#D9D8D0;--line-soft:#E6E5DE;--signal:#1B4BFF;--signal-deep:#0E2FB8;--signal-soft:rgba(27,75,255,.08);--gold:#A9791A;--gold-soft:rgba(169,121,26,.10);--font-display:'Bricolage Grotesque',system-ui,sans-serif;--font-body:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;--maxw:1180px;}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;scroll-padding-top:90px;-webkit-text-size-adjust:100%;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);line-height:1.65;font-size:17px;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;letter-spacing:-.02em;line-height:1.05;color:var(--ink);margin:0;}
p{margin:0 0 1rem;color:var(--slate);}
a{color:inherit;text-decoration:none;transition:.22s;}
img{max-width:100%;display:block;}
ul{margin:0;padding:0;list-style:none;}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}
.eyebrow{font-family:var(--font-mono);font-size:.74rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--signal);}
.mono{font-family:var(--font-mono);}
a:focus-visible,button:focus-visible,summary:focus-visible,.filter:focus-visible{outline:2px solid var(--signal);outline-offset:3px;border-radius:6px;}
nav{position:fixed;top:0;left:0;width:100%;z-index:200;background:rgba(237,237,231,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);transition:box-shadow .3s,background .3s;}
nav.scrolled{box-shadow:0 8px 30px -20px rgba(21,23,28,.4);}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:66px;}
.logo{display:flex;align-items:center;gap:11px;font-family:var(--font-display);font-weight:800;font-size:1.28rem;letter-spacing:-.03em;}
.logo .mark{width:30px;height:30px;border-radius:8px;background:var(--ink);display:grid;place-items:center;flex:none;}
.logo .mark svg{width:19px;height:19px;}
.nav-links{display:flex;align-items:center;gap:30px;}
.nav-links a{font-size:.92rem;font-weight:500;color:var(--slate);}
.nav-links a:hover{color:var(--ink);}
.nav-cta{background:var(--ink);color:#fff;padding:9px 18px;border-radius:8px;font-size:.88rem;font-weight:600;}
.nav-cta:hover{background:var(--signal);color:#fff;}
.burger{display:none;background:none;border:0;cursor:pointer;padding:6px;}
.burger span{display:block;width:22px;height:2px;background:var(--ink);margin:5px 0;border-radius:2px;}
header{padding:130px 0 70px;position:relative;overflow:hidden;}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:50px;align-items:center;}
.hero h1{font-size:clamp(2.6rem,5.4vw,4.5rem);font-weight:800;}
.hero h1 .acc{color:var(--signal);}
.hero .lead{font-size:1.2rem;max-width:520px;margin:1.5rem 0 2rem;color:var(--slate);}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:.95rem;padding:14px 24px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:.22s;}
.btn-primary{background:var(--signal);color:#fff;}
.btn-primary:hover{background:var(--signal-deep);transform:translateY(-2px);box-shadow:0 10px 24px rgba(27,75,255,.22);}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line);}
.btn-ghost:hover{border-color:var(--ink);background:var(--surface);}
.btn .arr{transition:transform .22s;}
.btn:hover .arr{transform:translateX(3px);}
.trust-strip{display:flex;gap:26px;margin-top:2.6rem;flex-wrap:wrap;}
.trust-strip .ti{display:flex;flex-direction:column;}
.trust-strip .ti b{font-family:var(--font-display);font-size:1.5rem;font-weight:700;}
.trust-strip .ti span{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-2);}
.mesh-card{position:relative;background:var(--ink);border-radius:20px;padding:26px;overflow:hidden;aspect-ratio:1/.92;box-shadow:0 30px 60px -28px rgba(21,23,28,.55);}
.mesh-card .label{position:absolute;top:20px;left:22px;font-family:var(--font-mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55);z-index:5;}
.mesh-card .reading{position:absolute;top:18px;right:22px;text-align:right;z-index:5;}
.mesh-card .reading b{font-family:var(--font-display);color:#fff;font-size:1.7rem;font-weight:700;display:block;line-height:1;}
.mesh-card .reading span{font-family:var(--font-mono);font-size:.66rem;letter-spacing:.1em;color:var(--signal);text-transform:uppercase;}
.mesh-svg{width:100%;height:100%;}
.ring{fill:none;stroke:var(--signal);stroke-width:1.4;opacity:0;transform-origin:center;animation:ring 3.4s ease-out infinite;}
.ring.r2{animation-delay:1.1s;}.ring.r3{animation-delay:2.2s;}
@keyframes ring{0%{opacity:.55;transform:scale(.25);}80%{opacity:0;}100%{opacity:0;transform:scale(1.15);}}
.edge{stroke:rgba(255,255,255,.16);stroke-width:1.2;}
.edge-live{stroke:url(#liveGrad);stroke-width:1.8;stroke-dasharray:5 90;stroke-linecap:round;animation:flow 2.6s linear infinite;}
@keyframes flow{to{stroke-dashoffset:-190;}}
.dot-pulse{fill:#fff;animation:dp 2.4s ease-in-out infinite;}
@keyframes dp{0%,100%{opacity:.5;}50%{opacity:1;}}
section{padding:88px 0;position:relative;}
.sec-head{max-width:640px;margin-bottom:48px;}
.sec-head h2{font-size:clamp(2rem,3.6vw,2.9rem);font-weight:700;margin:.7rem 0 .9rem;}
.sec-head p{font-size:1.1rem;}
.divline{height:1px;background:var(--line);border:0;margin:0;}
.method{background:var(--ink);color:#fff;}
.method h2,.method h3{color:#fff;}
.method .sec-head p{color:rgba(255,255,255,.66);}
.method .eyebrow{color:#7FA0FF;}
.method-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px;}
.method-item{border-top:1px solid rgba(255,255,255,.16);padding-top:18px;}
.method-item .n{font-family:var(--font-mono);font-size:.74rem;color:#7FA0FF;letter-spacing:.1em;}
.method-item h3{font-size:1.12rem;margin:10px 0 8px;font-weight:600;}
.method-item p{color:rgba(255,255,255,.62);font-size:.95rem;margin:0;}
.winner-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;}
.winner{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:.3s;position:relative;}
.winner:hover{transform:translateY(-6px);box-shadow:0 24px 50px -30px rgba(21,23,28,.5);border-color:var(--slate-2);}
.winner.top{border-color:rgba(169,121,26,.45);box-shadow:0 26px 55px -30px rgba(169,121,26,.5);}
.winner.top::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#E7C56A,var(--gold));z-index:6;}
.award{display:flex;align-items:center;gap:8px;padding:11px 18px;border-bottom:1px solid var(--line);font-family:var(--font-mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;}
.award.gold{background:var(--gold-soft);color:var(--gold);}
.award.blue{background:var(--signal-soft);color:var(--signal);}
.award svg{width:15px;height:15px;flex:none;}
.topflag{position:absolute;top:50px;right:14px;z-index:7;background:var(--ink);color:#fff;font-family:var(--font-mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;padding:5px 11px;border-radius:50px;display:flex;align-items:center;gap:5px;box-shadow:0 6px 16px -6px rgba(21,23,28,.6);}
.topflag svg{width:11px;height:11px;color:#E7C56A;}
.winner .imgbox{aspect-ratio:1/.74;background:var(--surface-2);display:grid;place-items:center;padding:26px;overflow:hidden;}
.winner .imgbox img{width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply;}
.winner .imgbox svg{width:88%;height:100%;}
.winner .body{padding:22px 22px 24px;display:flex;flex-direction:column;flex:1;}
.cat-tag{font-family:var(--font-mono);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--slate-2);}
.winner .body h3{font-size:1.4rem;margin:7px 0 4px;}
.winner .verdict{font-size:.97rem;color:var(--slate);margin:6px 0 16px;}
.score-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.bars{display:flex;gap:4px;}
.bar{width:9px;height:20px;border-radius:2px;background:var(--line);}
.bar.on{background:var(--signal);}
.score-num{font-family:var(--font-display);font-weight:700;font-size:1.15rem;}
.score-num .un{font-family:var(--font-mono);font-size:.8rem;color:var(--slate-2);font-weight:400;}
.pc{margin:0 0 18px;}
.pc li{display:flex;gap:9px;font-size:.92rem;color:var(--slate);margin-bottom:7px;align-items:flex-start;}
.pc li svg{width:15px;height:15px;flex:none;margin-top:4px;}
.pc .pro svg{color:var(--signal);}
.pc .con svg{color:var(--slate-2);}
.winner .buy{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:12px;border-top:1px solid var(--line-soft);padding-top:16px;}
.winner .buy .price{font-family:var(--font-mono);font-size:.82rem;color:var(--slate-2);}
.winner .buy .price b{display:block;font-family:var(--font-display);font-size:1.05rem;color:var(--ink);}
.buylink{background:var(--ink);color:#fff;padding:11px 17px;border-radius:8px;font-size:.85rem;font-weight:600;white-space:nowrap;}
.buylink:hover{background:var(--signal);}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:38px;}
.filter{font-family:var(--font-mono);font-size:.8rem;letter-spacing:.04em;padding:8px 16px;border-radius:50px;border:1px solid var(--line);background:var(--surface);cursor:pointer;color:var(--slate);transition:.2s;}
.filter:hover{border-color:var(--ink);color:var(--ink);}
.filter.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.pcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;transition:.25s;}
.pcard:hover{border-color:var(--slate-2);transform:translateY(-4px);box-shadow:0 18px 40px -28px rgba(21,23,28,.45);}
.pcard .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;}
.pcard .cat-tag{background:var(--surface-2);padding:4px 9px;border-radius:6px;}
.pcard .proto{font-family:var(--font-mono);font-size:.66rem;color:var(--signal);border:1px solid var(--signal-soft);background:var(--signal-soft);padding:4px 8px;border-radius:6px;white-space:nowrap;}
.pcard h3{font-size:1.15rem;margin-bottom:4px;}
.pcard .verdict{font-size:.9rem;color:var(--slate);margin-bottom:14px;flex:1;}
.pcard .score-row{margin-bottom:14px;}
.pcard .bar{height:16px;width:7px;}
.pcard .buy{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line-soft);padding-top:14px;margin-top:auto;}
.pcard .pr{font-family:var(--font-mono);font-size:.82rem;font-weight:500;}
.pcard .seelink{font-size:.85rem;font-weight:600;color:var(--signal);display:inline-flex;align-items:center;gap:5px;}
.pcard .seelink:hover{color:var(--signal-deep);}
.empty{grid-column:1/-1;text-align:center;color:var(--slate-2);padding:40px;font-family:var(--font-mono);font-size:.9rem;}
.standards{background:var(--surface-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
.std-intro{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;margin-bottom:50px;}
.std-intro h3{font-size:1.35rem;margin-bottom:12px;}
.std-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:54px;}
.std{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:24px;}
.std .ico{width:40px;height:40px;border-radius:10px;background:var(--ink);display:grid;place-items:center;margin-bottom:16px;}
.std .ico svg{width:21px;height:21px;color:#fff;}
.std h3{font-size:1.22rem;margin-bottom:6px;}
.std .kicker{font-family:var(--font-mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--signal);margin-bottom:14px;display:block;}
.std p{font-size:.93rem;margin-bottom:10px;}
.std .needs{font-family:var(--font-mono);font-size:.78rem;color:var(--slate-2);border-top:1px dashed var(--line);padding-top:12px;margin-top:4px;}
.std .needs b{color:var(--ink);}
.cmp-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--surface);margin-bottom:54px;}
table.cmp{border-collapse:collapse;width:100%;min-width:680px;font-size:.92rem;}
table.cmp th,table.cmp td{padding:15px 18px;text-align:left;border-bottom:1px solid var(--line-soft);}
table.cmp thead th{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-2);background:var(--surface-2);font-weight:500;}
table.cmp tbody th{font-family:var(--font-display);font-weight:700;color:var(--ink);font-size:1rem;}
table.cmp td{color:var(--slate);}
table.cmp tr:last-child td,table.cmp tr:last-child th{border-bottom:0;}
.helper{background:var(--ink);border-radius:16px;padding:38px 40px;color:#fff;}
.helper h3{color:#fff;font-size:1.5rem;margin-bottom:22px;}
.helper-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px 36px;}
.helper-row{display:flex;gap:14px;align-items:flex-start;border-top:1px solid rgba(255,255,255,.14);padding-top:16px;}
.helper-row .q{font-size:.95rem;color:rgba(255,255,255,.7);flex:1;}
.helper-row .a{font-family:var(--font-mono);font-size:.82rem;color:#7FA0FF;font-weight:500;white-space:nowrap;}
.helper .tip{color:rgba(255,255,255,.5);font-size:.82rem;margin:24px 0 0;}
.offer{background:radial-gradient(120% 90% at 80% 0%,var(--signal-soft),transparent 60%);}
.offer-grid{display:grid;grid-template-columns:1fr 1.05fr;gap:54px;align-items:center;}
.offer h2{font-size:clamp(1.9rem,3.4vw,2.7rem);margin:.7rem 0 1.1rem;}
.offer .otext{font-size:1.08rem;margin-bottom:1.8rem;}
.offer ul.benefits li{display:flex;gap:11px;align-items:flex-start;font-size:1.03rem;color:var(--slate);margin-bottom:12px;}
.offer ul.benefits svg{width:19px;height:19px;color:var(--signal);flex:none;margin-top:4px;}
.form-box{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:34px;box-shadow:0 30px 60px -40px rgba(21,23,28,.4);}
.form-box h3{font-size:1.35rem;margin-bottom:6px;}
.form-box>p{font-size:.92rem;margin-bottom:22px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-family:var(--font-mono);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-2);margin-bottom:8px;}
.ctrl{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:9px;background:var(--surface-2);color:var(--ink);font-family:var(--font-body);font-size:.97rem;transition:.2s;}
.ctrl:focus{outline:none;border-color:var(--signal);background:#fff;box-shadow:0 0 0 3px var(--signal-soft);}
select.ctrl{appearance:none;background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%23565C66' stroke-width='2'%3E%3Cpath d='M3 5l4 4 4-4'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;}
.fg-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-box .btn-primary{width:100%;justify-content:center;margin-top:8px;}
.form-note{font-size:.78rem;color:var(--slate-2);text-align:center;margin:14px 0 0;}
.faq-list{max-width:820px;margin:0 auto;}
.faq{border-bottom:1px solid var(--line);}
.faq summary{cursor:pointer;list-style:none;padding:22px 4px;display:flex;justify-content:space-between;align-items:center;gap:20px;font-family:var(--font-display);font-weight:600;font-size:1.12rem;}
.faq summary::-webkit-details-marker{display:none;}
.faq summary .pl{width:22px;height:22px;flex:none;position:relative;}
.faq summary .pl::before,.faq summary .pl::after{content:"";position:absolute;background:var(--signal);border-radius:2px;}
.faq summary .pl::before{width:14px;height:2px;top:10px;left:4px;}
.faq summary .pl::after{width:2px;height:14px;top:4px;left:10px;transition:.25s;}
.faq[open] summary .pl::after{transform:rotate(90deg);opacity:0;}
.faq .ans{padding:0 4px 24px;color:var(--slate);font-size:1rem;max-width:680px;}
footer{background:var(--ink);color:rgba(255,255,255,.6);padding:70px 0 34px;}
footer h4{color:#fff;font-family:var(--font-mono);font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;font-weight:500;margin-bottom:18px;}
.foot-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:40px;margin-bottom:46px;}
.foot-logo{display:flex;align-items:center;gap:11px;font-family:var(--font-display);font-weight:800;font-size:1.3rem;color:#fff;margin-bottom:14px;}
.foot-logo .mark{width:30px;height:30px;border-radius:8px;background:var(--signal);display:grid;place-items:center;}
.foot-logo .mark svg{width:19px;height:19px;}
footer .blurb{font-size:.92rem;max-width:300px;}
footer ul li{margin-bottom:11px;}
footer ul a{font-size:.92rem;}
footer ul a:hover{color:#fff;}
.disclosure{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:18px 20px;font-size:.85rem;line-height:1.6;margin-bottom:30px;}
.disclosure b{color:#fff;}
.foot-base{border-top:1px solid rgba(255,255,255,.1);padding-top:24px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:.84rem;}
.rv{opacity:0;transform:translateY(26px);}
@media(max-width:980px){.hero-grid{grid-template-columns:1fr;gap:40px;}.mesh-card{max-width:460px;}.method-grid{grid-template-columns:repeat(2,1fr);gap:24px;}.winner-grid,.cat-grid,.std-cards{grid-template-columns:repeat(2,1fr);}.std-intro,.offer-grid,.helper-grid{grid-template-columns:1fr;gap:30px;}.foot-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:680px){body{font-size:16px;}.nav-links{display:none;}.burger{display:block;}.nav-links.open{display:flex;position:absolute;top:66px;left:0;width:100%;flex-direction:column;background:var(--paper);padding:18px 28px;gap:16px;border-bottom:1px solid var(--line);}header{padding:104px 0 50px;}.winner-grid,.cat-grid,.std-cards,.fg-2,.helper-grid{grid-template-columns:1fr;}.trust-strip{gap:20px;}.foot-grid{grid-template-columns:1fr;gap:30px;}section{padding:62px 0;}.helper,.form-box{padding:26px 22px;}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}.rv{opacity:1!important;transform:none!important;}}
</style>
</head>

<script>
/* ---------- bootstrap: load freshest config.js, resolve content from Firebase, then render ---------- */
(function(){
  var online=/^https?:/.test(location.protocol);
  var s=document.createElement('script');
  s.src='config.js'+(online?('?v='+Date.now()):'');
  s.onload=__boot; s.onerror=__boot;
  document.head.appendChild(s);
})();
function deepMerge(base,src){
  if(Array.isArray(src))return src.slice();
  if(typeof src!=='object'||src===null)return src;
  var out=Array.isArray(base)?[]:Object.assign({},base);
  for(var k in src){
    if(typeof src[k]==='object'&&src[k]!==null&&!Array.isArray(src[k])&&base&&typeof base[k]==='object')out[k]=deepMerge(base[k],src[k]);
    else out[k]=src[k];
  } return out;
}
function __boot(){
  var FC=window.FIREBASE_CONFIG||{};
  if(FC.apiKey && window.firebase){
    try{
      if(!firebase.apps.length) firebase.initializeApp(FC);
      firebase.firestore().doc('site/config').get()
        .then(function(snap){ __render(snap&&snap.exists?snap.data():null); })
        .catch(function(e){ console.warn('Firestore-læsning fejlede; bruger standard.',e); __render(null); });
      return;
    }catch(e){ console.warn('Firebase-init fejlede; bruger standard.',e); }
  }
  __render(null);
}

function __render(remote){
// --- TILFØJET FALLBACK START ---
// Dette sikrer at siden renderes, selvom config.js mangler
window.DEFAULT_CONFIG = window.DEFAULT_CONFIG || {
  theme: { paper: "#EDEDE7", surface: "#FBFBF8", surface2: "#F4F4EF", ink: "#15171C", signal: "#1B4BFF", signalDeep: "#0E2FB8", gold: "#A9791A" },
  brand: { name: "WiFiHuset", tagline: "Din guide til Smart Home." },
  hero: { eyebrow: "Velkommen", line1: "Fremtidens", line2: "Smart Home", line3: "begynder her", lead: "Siden virker nu med fallback-data.", btnPrimary: "Start her", btnGhost: "Læs mere", stats: [], cardLabel: "Mesh", cardScore: "10", cardScoreLabel: "Score" },
  method: { eyebrow: "Metode", heading: "Sådan gør vi", sub: "Vi tester grundigt", items: [] },
  winnersHead: { eyebrow: "Testvindere", heading: "De bedste systemer", sub: "" },
  winners: [],
  catalogHead: { eyebrow: "Katalog", heading: "Alle produkter", sub: "" },
  catalog: [],
  standardsHead: { eyebrow: "Forstå teknologien", heading: "Standarder", sub: "" },
  standardsIntro: { leftTitle: "Før", leftHtml: "...", rightTitle: "Nu", rightHtml: "..." },
  standards: [],
  compare: [],
  helper: { title: "Hurtig hjælp", tip: "", rows: [] },
  offer: { eyebrow: "Tilbud", heading: "Få hjælp til opsætning", text: "Få et uforpligtende tilbud.", formTitle: "Din opgave", formSub: "", formNote: "", benefits: [], formCats: [] },
  faqHead: { eyebrow: "FAQ", heading: "Ofte stillede spørgsmål" },
  faqs: [],
  footer: { disclosure: "Uvildig guide", copyright: "© 2026 WiFiHuset", sub: "All rights reserved", columns: [] }
};
window.ART = window.ART || { generic: "<svg></svg>" };
window.STD_ICONS = window.STD_ICONS || { _default: "" };
// --- TILFØJET FALLBACK SLUT ---

var C=JSON.parse(JSON.stringify(window.DEFAULT_CONFIG));
if(remote) C=deepMerge(C,remote);

/* theme */
function hexA(hex,a){try{var n=parseInt(hex.replace('#',''),16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}catch(e){return hex;}}
(function(t){var r=document.documentElement.style;
  r.setProperty('--paper',t.paper);r.setProperty('--surface',t.surface);r.setProperty('--surface-2',t.surface2);
  r.setProperty('--ink',t.ink);r.setProperty('--signal',t.signal);r.setProperty('--signal-deep',t.signalDeep);r.setProperty('--gold',t.gold);
  r.setProperty('--signal-soft',hexA(t.signal,.08));r.setProperty('--gold-soft',hexA(t.gold,.10));})(C.theme);
function themedArt(svg){return svg.replace(/#15171C/g,C.theme.ink).replace(/#1B4BFF/g,C.theme.signal).replace(/#FBFBF8/g,C.theme.surface);}
window.themedArt=themedArt;

/* scalar bindings */
function getPath(o,p){return p.split('.').reduce(function(a,k){return a==null?a:a[k];},o);}
document.querySelectorAll('[data-cfg]').forEach(function(el){var v=getPath(C,el.dataset.cfg);if(v!=null)el.textContent=v;});
document.querySelectorAll('[data-cfg-html]').forEach(function(el){var v=getPath(C,el.dataset.cfgHtml);if(v!=null)el.innerHTML=v;});
document.title=C.brand.metaTitle||C.brand.name;

var prRunner=function(n){return 'https://www.pricerunner.dk/search?q='+encodeURIComponent(n);};
function barsHTML(score){var f=Math.round(score/2),h='<div class="bars">';for(var i=1;i<=5;i++)h+='<span class="bar'+(i<=f?' on':'')+'"></span>';return h+'</div>';}
var ico={
  star:'<svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 1.6l2.5 5.2 5.7.7-4.2 3.9 1.1 5.6L10 14.4 4.9 17l1.1-5.6L1.8 7.5l5.7-.7z"/></svg>',
  plus:'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>',
  minus:'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 8h10"/></svg>',
  arr:'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>',
  check:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 10l4 4 8-9"/></svg>'
};
var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};

document.getElementById('trust-strip').innerHTML=C.hero.stats.map(function(s){return '<div class="ti"><b>'+esc(s.v)+'</b><span>'+esc(s.l)+'</span></div>';}).join('');
document.getElementById('method-grid').innerHTML=C.method.items.map(function(m,i){return '<div class="method-item rv"><div class="n">'+String(i+1).padStart(2,'0')+'</div><h3>'+esc(m.t)+'</h3><p>'+esc(m.d)+'</p></div>';}).join('');

document.getElementById('winners').innerHTML=C.winners.map(function(w){
  var media=w.img?'<img src="'+w.img+'" alt="'+esc(w.name)+'" loading="lazy" style="object-fit:'+(w.imgFit||'contain')+'" onerror="this.outerHTML=themedArt((window.ART[\''+w.artKey+'\']||window.ART.generic))">':themedArt(window.ART[w.artKey]||window.ART.generic);
  return '<article class="winner rv'+(w.featured?' top':'')+'">'+
    '<div class="award '+(w.featured?'gold':'blue')+'">'+ico.star+esc(w.award)+'</div>'+
    (w.featured?'<div class="topflag">'+ico.star+'Bedste i test</div>':'')+
    '<div class="imgbox">'+media+'</div>'+
    '<div class="body"><span class="cat-tag">'+esc(w.cat)+'</span><h3>'+esc(w.name)+'</h3><p class="verdict">'+esc(w.verdict)+'</p>'+
    '<div class="score-row">'+barsHTML(w.score)+'<span class="score-num"><span class="cv" data-count="'+w.score+'">0.0</span><span class="un"> / 10</span></span></div>'+
    '<ul class="pc">'+w.pros.map(function(p){return '<li class="pro">'+ico.plus+esc(p)+'</li>';}).join('')+w.cons.map(function(c){return '<li class="con">'+ico.minus+esc(c)+'</li>';}).join('')+'</ul>'+
    '<div class="buy"><span class="price">Vejl. pris<b>'+esc(w.price)+'</b></span><a class="buylink" href="'+prRunner(w.name)+'" target="_blank" rel="noopener nofollow">Se aktuelle priser</a></div></div></article>';
}).join('');

var cats=['Alle'].concat(C.catalog.map(function(p){return p.cat;}).filter(function(v,i,a){return a.indexOf(v)===i;}));
var filtersEl=document.getElementById('filters');
filtersEl.innerHTML=cats.map(function(c,i){return '<button class="filter'+(i===0?' active':'')+'" data-cat="'+esc(c)+'">'+esc(c)+'</button>';}).join('');
function renderCatalog(cat){
  var list=cat==='Alle'?C.catalog:C.catalog.filter(function(p){return p.cat===cat;});
  var el=document.getElementById('catalog');
  if(!list.length){el.innerHTML='<div class="empty">Ingen produkter i denne kategori endnu.</div>';return;}
  el.innerHTML=list.map(function(p){return '<article class="pcard"><div class="top"><span class="cat-tag">'+esc(p.cat)+'</span><span class="proto">'+esc(p.proto)+'</span></div>'+
    '<h3>'+esc(p.name)+'</h3><p class="verdict">'+esc(p.verdict)+'</p>'+
    '<div class="score-row">'+barsHTML(p.score)+'<span class="score-num">'+Number(p.score).toFixed(1)+'<span class="un"> / 10</span></span></div>'+
    '<div class="buy"><span class="pr">'+(p.score>=9?'Topkarakter':'Anbefalet')+'</span><a class="seelink" href="'+prRunner(p.name)+'" target="_blank" rel="noopener nofollow">Se priser '+ico.arr+'</a></div></article>';}).join('');
}
renderCatalog('Alle');
filtersEl.addEventListener('click',function(e){var b=e.target.closest('.filter');if(!b)return;filtersEl.querySelectorAll('.filter').forEach(function(x){x.classList.remove('active');});b.classList.add('active');renderCatalog(b.dataset.cat);});

document.getElementById('stdcards').innerHTML=C.standards.map(function(s){
  var path=(window.STD_ICONS[s.n]||window.STD_ICONS._default);
  return '<div class="std rv"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+path+'</svg></div><span class="kicker">'+esc(s.k)+'</span><h3>'+esc(s.n)+'</h3><p>'+esc(s.p)+'</p><div class="needs">'+s.need+'</div></div>';
}).join('');
document.getElementById('cmp-body').innerHTML=C.compare.map(function(r){return '<tr><th>'+esc(r.std)+'</th><td>'+esc(r.type)+'</td><td>'+esc(r.freq)+'</td><td>'+esc(r.hub)+'</td><td>'+esc(r.best)+'</td></tr>';}).join('');
document.getElementById('helper-rows').innerHTML=C.helper.rows.map(function(r){return '<div class="helper-row"><div class="q">'+esc(r.q)+'</div><div class="a">'+esc(r.a)+'</div></div>';}).join('');
document.getElementById('benefits').innerHTML=C.offer.benefits.map(function(b){return '<li>'+ico.check+esc(b)+'</li>';}).join('');
document.getElementById('kat').innerHTML='<option>Vælg venligst…</option>'+C.offer.formCats.map(function(c){return '<option>'+esc(c)+'</option>';}).join('');
document.getElementById('leadbtn').addEventListener('click',function(){alert('Tak! I en live-version sendes din forespørgsel nu videre til installatører i dit område.');});
document.getElementById('faq-list').innerHTML=C.faqs.map(function(f){return '<details class="faq"><summary>'+esc(f.q)+'<span class="pl"></span></summary><div class="ans">'+esc(f.a)+'</div></details>';}).join('');
document.getElementById('foot-cols').innerHTML=C.footer.columns.map(function(col){return '<div><h4>'+esc(col.title)+'</h4><ul>'+col.links.map(function(l){return '<li><a href="'+esc(l.href)+'">'+esc(l.label)+'</a></li>';}).join('')+'</ul></div>';}).join('');

/* interactions */
var burger=document.getElementById('burger'),navlinks=document.getElementById('navlinks');
burger.addEventListener('click',function(){navlinks.classList.toggle('open');});
navlinks.addEventListener('click',function(e){if(e.target.tagName==='A')navlinks.classList.remove('open');});
var navEl=document.getElementById('nav');
addEventListener('scroll',function(){navEl.classList.toggle('scrolled',scrollY>20);});

var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
if(!reduce&&'IntersectionObserver' in window){
  var io=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){var el=en.target,t=parseFloat(el.dataset.count),s=null;
    function step(ts){if(!s)s=ts;var p=Math.min((ts-s)/900,1);el.textContent=(t*(1-Math.pow(1-p,3))).toFixed(1);if(p<1)requestAnimationFrame(step);else el.textContent=t.toFixed(1);}
    requestAnimationFrame(step);io.unobserve(el);}});},{threshold:.6});
  document.querySelectorAll('.cv').forEach(function(el){io.observe(el);});
}else{document.querySelectorAll('.cv').forEach(function(el){el.textContent=parseFloat(el.dataset.count).toFixed(1);});}

if(!reduce&&window.gsap){
  gsap.registerPlugin(ScrollTrigger);
  gsap.to('.hero .rv',{opacity:1,y:0,duration:.9,stagger:.1,ease:'power3.out'});
  gsap.to('.mesh-card.rv',{opacity:1,y:0,duration:1,delay:.2,ease:'power3.out'});
  gsap.utils.toArray('.rv').forEach(function(el){if(el.closest('.hero')||el.classList.contains('mesh-card'))return;
    gsap.to(el,{opacity:1,y:0,duration:.8,ease:'power2.out',scrollTrigger:{trigger:el,start:'top 88%'}});});
}else{document.querySelectorAll('.rv').forEach(function(el){el.style.opacity=1;el.style.transform='none';});}
} /* end __render */
</script>
</body>
</html>
